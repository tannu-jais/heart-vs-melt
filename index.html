<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart vs Melt</title>
    <link rel="stylesheet" href="start.css">
</head>
<body>

    <div class="card">

        <h1 class="title">
            🫠 ❤️ <span>Melting Heart Battle</span> ❤️ 🫠
        </h1>

        <p class="subtitle">
            Choose Your Players
        </p>

        <div class="player-box">

            <label>Player 1 Name</label>
            <input
                type="text"
                id="player1"
                placeholder="Enter Name">

            <label>Choose Emoji</label>

            <select id="emoji1">
                <option>❤️</option>
                <option>💖</option>
                <option>💘</option>
                <option>💕</option>
                <option>💝</option>
            </select>

        </div>

        <div class="player-box">

            <label>Player 2 Name</label>

            <input
                type="text"
                id="player2"
                placeholder="Enter Name">

            <label>Choose Emoji</label>

            <select id="emoji2">
                <option>🫠</option>
                <option>💌</option>
                <option>🥰</option>
                <option>😍</option>
                <option>😘</option>
            </select>

        </div>

        <button id="startBtn">
            Start Game 🚀
        </button>

    </div>

    <!-- Footer -->

    <footer class="footer">
        ❤️ Created with Love by Tanya ♥ <br>
        © 2026 Tanya. All Rights Reserved.
    </footer>

    <script src="start.js"></script>

</body>
</html>
